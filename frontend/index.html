<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container py-5">
    <h1 class="mb-4 text-center"><i class="bi bi-kanban"></i> Task Tracker</h1>

    <!-- Форма создания задачи -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Создать новую задачу</h5>
        </div>
        <div class="card-body">
            <form id="createTaskForm">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="createTitle" class="form-label">Название задачи *</label>
                        <input type="text" class="form-control" id="createTitle" required maxlength="255">
                    </div>
                    <div class="col-md-4">
                        <label for="createRequester" class="form-label">Заявитель *</label>
                        <input type="text" class="form-control" id="createRequester" required maxlength="50">
                    </div>
                    <div class="col-md-4">
                        <label for="createAssignee" class="form-label">Исполнитель</label>
                        <select class="form-select" id="createAssignee">
                            <option value="">Не назначен</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label for="createDescription" class="form-label">Описание *</label>
                        <textarea class="form-control" id="createDescription" rows="2" required maxlength="1000"></textarea>
                    </div>
                    <div class="col-12 text-end">
                        <button type="submit" class="btn btn-primary" id="createBtn">
                            <span class="spinner-border spinner-border-sm loading-spinner" id="createSpinner" role="status"></span>
                            Создать задачу
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Фильтр и список задач -->
    <div class="card shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Список задач</h5>
            <div class="d-flex align-items-center">
                <label for="statusFilter" class="me-2 mb-0">Фильтр по статусу:</label>
                <select class="form-select form-select-sm" id="statusFilter" style="width: 200px;">
                    <option value="">Все статусы</option>
                    <option value="new">Новая</option>
                    <option value="in_progress">В работе</option>
                    <option value="done">Выполнена</option>
                    <option value="cancelled">Отменена</option>
                </select>
            </div>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th scope="col">ID</th>
                            <th scope="col">Название</th>
                            <th scope="col">Заявитель</th>
                            <th scope="col">Исполнитель</th>
                            <th scope="col">Статус</th>
                            <th scope="col">Обновлено</th>
                            <th scope="col" class="text-end">Действия</th>
                        </tr>
                    </thead>
                    <tbody id="tasksTableBody">
                        <!-- Заполняется через JS -->
                    </tbody>
                </table>
            </div>
            <div id="emptyState" class="text-center py-5 text-muted" style="display: none;">
                <i class="bi bi-inbox fs-1"></i>
                <p class="mt-2">Задач не найдено</p>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно деталей/редактирования задачи -->
<div class="modal fade" id="taskDetailsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTaskTitle">Детали задачи</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="updateTaskForm">
                    <input type="hidden" id="updateTaskId">
                    <div class="mb-3">
                        <label class="form-label text-muted small">Описание</label>
                        <p id="modalTaskDescription" class="mb-0"></p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">Заявитель</label>
                        <p id="modalTaskRequester" class="mb-0"></p>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="updateStatus" class="form-label">Изменить статус</label>
                            <select class="form-select" id="updateStatus">
                                <option value="new">Новая</option>
                                <option value="in_progress">В работе</option>
                                <option value="done">Выполнена</option>
                                <option value="cancelled">Отменена</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="updateAssignee" class="form-label">Изменить исполнителя</label>
                            <select class="form-select" id="updateAssignee">
                                <option value="">Не назначен</option>
                            </select>
                        </div>
                    </div
                </form>
            </div>
            <div class="modal-footer justify-content-between">
                <button type="button" class="btn btn-outline-danger" id="deleteTaskBtn">
                    <i class="bi bi-trash"></i> Удалить задачу
                </button>
                <div>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" id="saveTaskBtn">
                        <span class="spinner-border spinner-border-sm loading-spinner" id="saveSpinner" role="status"></span>
                        Сохранить изменения
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Main Application Script (Module) -->
<script type="module" src="js/main.js"></script>

</body>
</html>
